  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback } = React;

    // Firebase helpers via global
    const waitFB = () => new Promise(res => {
      if(window.__FB_READY__) return res(window.__FB__);
      window.addEventListener('fb-ready', () => res(window.__FB__), {once:true});
    });

    const fsGet    = async (col,id)       => { const {db,doc,getDoc}=await waitFB(); const d=await getDoc(doc(db,col,id)); return d.exists()?{id:d.id,...d.data()}:null; };
    const fsSet    = async (col,id,data)  => { const {db,doc,setDoc,serverTimestamp}=await waitFB(); return setDoc(doc(db,col,id),{...data,updatedAt:serverTimestamp()}); };
    const fsAdd    = async (col,data)     => { const {db,collection,addDoc,serverTimestamp}=await waitFB(); return addDoc(collection(db,col),{...data,createdAt:serverTimestamp()}); };
    const fsUpdate = async (col,id,data)  => { const {db,doc,updateDoc,serverTimestamp}=await waitFB(); return updateDoc(doc(db,col,id),{...data,updatedAt:serverTimestamp()}); };
    const fsQuery  = async (col,field,val)=> { const {db,collection,query,where,getDocs}=await waitFB(); const s=await getDocs(query(collection(db,col),where(field,"==",val))); return s.docs.map(d=>({id:d.id,...d.data()})); };
    const fsListen = async (col,field,val,cb) => { const {db,collection,query,where,onSnapshot}=await waitFB(); return onSnapshot(query(collection(db,col),where(field,"==",val)),s=>cb(s.docs.map(d=>({id:d.id,...d.data()})))); };
    const fsListenAll = async (col,cb)    => { const {db,collection,onSnapshot}=await waitFB(); return onSnapshot(collection(db,col),s=>cb(s.docs.map(d=>({id:d.id,...d.data()})))); };
    const fbSignIn = async (e,p)          => { const {auth,signInWithEmailAndPassword}=await waitFB(); return signInWithEmailAndPassword(auth,e,p); };
    const fbSignUp = async (e,p)          => { const {auth,createUserWithEmailAndPassword}=await waitFB(); return createUserWithEmailAndPassword(auth,e,p); };
    const fbSignOut= async ()             => { const {auth,signOut}=await waitFB(); return signOut(auth); };
    const fbOnAuth = async (cb)           => { const {auth,onAuthStateChanged}=await waitFB(); return onAuthStateChanged(auth,cb); };

/* ─── LOGIN ─── */
function LoginScreen({onLogin,onGoRegister,t,themeToggle,theme}) {
  const [username,setUsername] = useState("");
  const [pass,setPass]         = useState("");
  const [err,setErr]           = useState("");
  const [loading,setLoading]   = useState(false);

  const submit = () => {
    if(!username.trim()){setErr("Informe seu usuário.");return;}
    if(!pass){setErr("Informe sua senha.");return;}
    if(username.trim().toLowerCase()==="admin"&&pass==="admin123"){onLogin({isAdmin:true,name:"Administrador",avatar:"AD"});return;}
    const u = INIT_USERS.find(x=>x.username===username.trim().toLowerCase()&&x.password===pass);
    if(!u){setErr("Usuário ou senha incorretos.");return;}
    setErr("");setLoading(true);
    setTimeout(()=>{setLoading(false);onLogin(u);},600);
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",padding:"32px 24px",background:t.bg}}>
      <style>{makeCSS(t)}</style>
      <div style={{position:"absolute",top:20,right:20}}>

      </div>
      <div className="fi" style={{textAlign:"center",marginBottom:40}}>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:58,letterSpacing:4,background:`linear-gradient(135deg,${t.accent},#EC4899)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1}}>INFLUENCE</div>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:24,letterSpacing:8,color:t.sub}}>PRO</div>
        <div style={{fontSize:12,color:t.sub,marginTop:8}}>Gestão para micro influenciadores</div>
      </div>
      <div className="fi2" style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:20,padding:24}}>
        <div style={{fontSize:17,fontWeight:800,marginBottom:4,color:t.text}}>Entrar na sua conta</div>
        <div style={{fontSize:12,color:t.sub,marginBottom:24}}>Bem-vindo de volta 👋</div>
        <FldBase label="USUÁRIO" value={username} onChange={e=>setUsername(e.target.value)} placeholder="Ex: camilarocha" onKeyDown={e=>e.key==="Enter"&&submit()} t={t}/>

          <FldBase label="USUÁRIO (sem @)"                value={username} onChange={e=>setUsername(e.target.value)} placeholder="Ex: camilarocha"  t={t}/>

          <FldBase label="CÓDIGO DE INDICAÇÃO (opcional)" value={refCode}  onChange={e=>setRefCode(e.target.value)}  placeholder="Ex: CAM2847" t={t}/>
        </>)}
        {step===2&&(<>
          <div style={{fontSize:18,fontWeight:800,marginBottom:4,color:t.text}}>Escolha seu plano</div>
          <div style={{fontSize:12,color:t.sub,marginBottom:20}}>Pode mudar depois a qualquer momento</div>
          {PLANS.map(p=>(
            <div key={p.key} onClick={()=>setPlan(p.key)} className="s" style={{background:plan===p.key?`${p.color}14`:t.inputBg,border:`2px solid ${plan===p.key?p.color:t.border}`,borderRadius:16,padding:16,marginBottom:10,cursor:"pointer",position:"relative"}}>
              {p.badge&&<div style={{position:"absolute",top:-9,right:12,background:p.color,color:"#FFF",fontSize:9,fontWeight:800,padding:"2px 8px",borderRadius:10}}>{p.badge}</div>}
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <div style={{fontSize:16,fontWeight:800,color:plan===p.key?p.color:t.text}}>{p.name}</div>
                <div style={{fontSize:18,fontWeight:800,color:p.color}}>{p.price}</div>
              </div>
              {p.features.map(f=><div key={f} style={{fontSize:11,color:t.sub,marginBottom:4,display:"flex",gap:6}}><span style={{color:p.color}}>✓</span>{f}</div>)}
            </div>
          ))}
        </>)}
        <ErrBox msg={err}/>
        <PBtn onClick={next} t={t} style={{marginTop:4}}>{loading?"Criando conta...":step===2?"Criar conta":"Continuar →"}</PBtn>
      </div>
    </div>
  );
}

/* ─── CAMPANHA MODAL ─── */
function CampanhaModal({onClose,onSave,initial,t}) {
  const isEdit = !!initial;
  const [brand,setBrand]     = useState(initial?.brand||"");
  const [valor,setValor]     = useState(initial?.value?.toString()||"");
  const [payment,setPayment] = useState(initial?.payment||"pago");
  const [inicio,setInicio]   = useState(initial?.inicio||"");
  const [fim,setFim]         = useState(initial?.delivery||"");
  const [itens,setItens]     = useState(initial?.campanhaItens||[
    {tipo:"reels",qtd:2},
    {tipo:"story",qtd:4},
  ]);
  const [err,setErr]   = useState("");
  const [saving,setSaving] = useState(false);

  const addItem = () => setItens(prev=>[...prev,{tipo:"reels",qtd:1}]);
  const removeItem = i => setItens(prev=>prev.filter((_,idx)=>idx!==i));
  const updateItem = (i,field,val) => setItens(prev=>prev.map((it,idx)=>idx===i?{...it,[field]:val}:it));

  const totalPosts = itens.reduce((a,b)=>a+(Number(b.qtd)||0),0);

  const save = async () => {
    if(!brand.trim()||!inicio||!fim){setErr("Preencha marca, início e fim.");return;}
    if(itens.length===0){setErr("Adicione ao menos 1 tipo de post.");return;}
    setSaving(true);
    await onSave({
      brand:brand.trim(),
      type:"campanha",
      payment,
      value:payment==="pago"?Number(valor)||0:0,
      status:"pendente",
      delivery:fim,
      inicio,
      campanhaItens:itens,
      campanhaTotal:totalPosts,
      campanhaFeito:initial?.campanhaFeito||0,
      img:brand.substr(0,2).toUpperCase(),
      payStatus:initial?.payStatus||"aguardando",
    });
    setSaving(false);
  };

  return (
    <Modal onClose={onClose} t={t}>
      <div style={{fontSize:18,fontWeight:800,marginBottom:2,color:t.text}}>{isEdit?"Editar Campanha":"Nova Campanha 📦"}</div>
      <div style={{fontSize:12,color:t.sub,marginBottom:20}}>Pacote de posts combinados com a marca</div>

      <Fld label="NOME DA MARCA *" value={brand} onChange={e=>setBrand(e.target.value)} placeholder="Ex: Nike, Shein..." t={t}/>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <div>
          <label style={{fontSize:10,fontWeight:800,color:t.sub,display:"block",marginBottom:6}}>INÍCIO *</label>
          <input value={inicio} onChange={e=>setInicio(e.target.value)} type="date"
            style={{width:"100%",background:t.inputBg,border:`1px solid ${t.inputBorder}`,borderRadius:10,padding:"12px 12px",fontSize:13,color:t.text,outline:"none"}}/>
        </div>
        <div>
          <label style={{fontSize:10,fontWeight:800,color:t.sub,display:"block",marginBottom:6}}>FIM *</label>
          <input value={fim} onChange={e=>setFim(e.target.value)} type="date"
            style={{width:"100%",background:t.inputBg,border:`1px solid ${t.inputBorder}`,borderRadius:10,padding:"12px 12px",fontSize:13,color:t.text,outline:"none"}}/>
        </div>
      </div>

      <div style={{marginBottom:14}}>
        <label style={{fontSize:10,fontWeight:800,color:t.sub,display:"block",marginBottom:8}}>PAGAMENTO</label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[{k:"pago",l:"💸 Pago"},{k:"permuta",l:"🎁 Permuta"}].map(p=>(
            <button key={p.k} onClick={()=>setPayment(p.k)} style={{padding:"11px 0",borderRadius:10,border:`2px solid ${payment===p.k?t.accent:t.border}`,background:payment===p.k?t.accentSoft:t.inputBg,color:payment===p.k?t.accent:t.sub,fontWeight:800,fontSize:13,cursor:"pointer"}}>{p.l}</button>
          ))}
        </div>
      </div>

      {payment==="pago"&&(
        <div style={{marginBottom:14}}>
          <label style={{fontSize:10,fontWeight:800,color:t.sub,display:"block",marginBottom:6}}>VALOR TOTAL DA CAMPANHA (R$)</label>
          <input value={valor} onChange={e=>setValor(e.target.value)} placeholder="0,00" type="number"
            style={{width:"100%",background:t.inputBg,border:`1px solid ${t.inputBorder}`,borderRadius:10,padding:"13px 14px",fontSize:16,color:"#34D399",fontWeight:800,outline:"none"}}/>
        </div>
      )}

      {/* ITENS DO PACOTE */}
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <label style={{fontSize:10,fontWeight:800,color:t.sub}}>CONTEÚDOS DO PACOTE</label>
          <button onClick={addItem} style={{background:t.accentSoft,border:`1px solid ${t.accent}44`,borderRadius:8,padding:"4px 12px",color:t.accent,fontSize:11,fontWeight:800,cursor:"pointer"}}>+ Adicionar</button>
        </div>

        {itens.map((it,i)=>(
          <div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:8,background:t.inputBg,borderRadius:12,padding:"10px 12px"}}>
            <select value={it.tipo} onChange={e=>updateItem(i,"tipo",e.target.value)}
              style={{flex:1,background:t.surface,border:`1px solid ${t.border}`,borderRadius:8,padding:"8px 10px",color:TYPE_COLOR[it.tipo]||t.text,fontSize:13,fontWeight:700,outline:"none"}}>
              <option value="reels">🎬 Reels</option>
              <option value="feed">📸 Feed</option>
              <option value="story">📱 Story</option>
            </select>
            <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
              <button onClick={()=>updateItem(i,"qtd",Math.max(1,(Number(it.qtd)||1)-1))}
                style={{width:28,height:28,borderRadius:8,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:16,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
              <div style={{minWidth:28,textAlign:"center",fontSize:16,fontWeight:800,color:t.text}}>{it.qtd}</div>
              <button onClick={()=>updateItem(i,"qtd",(Number(it.qtd)||1)+1)}
                style={{width:28,height:28,borderRadius:8,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:16,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
            </div>
            <button onClick={()=>removeItem(i)}
              style={{width:28,height:28,borderRadius:8,border:"1px solid #F8717130",background:"#F8717108",color:"#F87171",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
          </div>
        ))}

        <div style={{background:`${t.accent}0C`,border:`1px solid ${t.accent}22`,borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}>
          <span style={{fontSize:12,color:t.sub,fontWeight:600}}>Total de posts no pacote</span>
          <span style={{fontSize:18,fontWeight:800,color:t.accent}}>{totalPosts} posts</span>
        </div>
      </div>

      <ErrBox msg={err}/>
      <PBtn onClick={save} t={t} disabled={saving}>{saving?"Salvando...":isEdit?"Salvar Campanha":"Criar Campanha 📦"}</PBtn>
    </Modal>
  );
}

function AdminPanel({t,themeToggle,theme,onLogout}) {
  const [tab,setTab]             = useState("dashboard");
  const [users,setUsers]         = useState([...INIT_USERS]);
  const [withdrawals,setWithdrawals] = useState([...INIT_WITHDRAWALS]);
  const [search,setSearch]       = useState("");
  const [editUser,setEditUser]   = useState(null);

  const allPublis = INIT_PUBLIS;
  const premium   = users.filter(u=>u.plan==="premium");
  const freeUsers = users.filter(u=>u.plan==="free");
  const totalRevenue = premium.length * 10;
  const totalRefs = users.reduce((a,u)=>a+(u.referrals?.length||0),0);

  const filtUsers = users.filter(u=>
    u.name.toLowerCase().includes(search.toLowerCase())||
    u.username.toLowerCase().includes(search.toLowerCase())
  );

  // Build full network tree
  const buildNetworkTree = () => {
    const roots = users.filter(u=>!u.referredBy);
    const buildBranch = (u, level=0) => {
      const children = users.filter(x=>x.referredBy===u.referralId);
      return {user:u, level, children: children.map(c=>buildBranch(c,level+1))};
    };
    return roots.map(r=>buildBranch(r));
  };

  const renderNode = (node) => (
    <div key={node.user.id} style={{marginLeft:node.level*16}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${t.border}`}}>
        {node.level>0&&<div style={{width:12,height:1,background:t.border,flexShrink:0}}/>}
        <div style={{width:30,height:30,borderRadius:"50%",background:`linear-gradient(135deg,${t.accent},#6366F1)`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,color:"#FFF",flexShrink:0}}>{node.user.avatar}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:700,color:t.text}}>{node.user.name}</div>
          <div style={{fontSize:10,color:t.sub}}>@{node.user.username} · ID: {node.user.referralId}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2,flexShrink:0}}>
          <Pill label={node.user.plan==="premium"?"✦ Premium":"Free"} color={node.user.plan==="premium"?t.accent:"#6B7280"}/>
          {node.level>0&&<div style={{fontSize:9,color:t.sub}}>Nível {node.level}</div>}
        </div>
      </div>
      {node.children.map(c=>renderNode(c))}
    </div>
  );

  return (
    <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",background:t.bg,minHeight:"100vh",maxWidth:430,margin:"0 auto",color:t.text}}>
      <style>{makeCSS(t)}</style>

      <div style={{background:t.navBg,padding:"16px 16px 0",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:"linear-gradient(135deg,#F87171,#EC4899)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:"#FFF"}}>AD</div>
            <div>
              <div style={{fontSize:13,fontWeight:800,color:t.text}}>Painel Admin</div>
              <div style={{fontSize:11,color:"#F87171"}}>Acesso total</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={themeToggle} className="s" style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14}}>{theme==="dark"?"☀️":"🌙"}</button>
            <button onClick={onLogout} style={{background:"#F8717114",border:"1px solid #F8717128",color:"#F87171",borderRadius:8,padding:"4px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Sair</button>
          </div>
        </div>
        <div style={{display:"flex",borderBottom:`1px solid ${t.border}`}}>
          {[{id:"dashboard",icon:"⬡",label:"Dashboard"},{id:"users",icon:"👥",label:"Usuários"},{id:"rede",icon:"⬟",label:"Rede"},{id:"pagamentos",icon:"💸",label:"Pagamentos"}].map(n=>(
            <button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,padding:"8px 2px",background:"none",border:"none",borderBottom:`2px solid ${tab===n.id?"#F87171":"transparent"}`,color:tab===n.id?"#F87171":t.sub,cursor:"pointer",fontSize:10,fontWeight:800,display:"flex",flexDirection:"column",alignItems:"center",gap:2,transition:"all .2s",marginBottom:-1}}>
              <span style={{fontSize:15}}>{n.icon}</span>{n.label}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:"16px 16px 80px",overflowY:"auto",maxHeight:"calc(100vh - 120px)"}}>

        {/* ADMIN DASHBOARD */}
        {tab==="dashboard"&&(
          <div className="fi">
            <div style={{fontSize:20,fontWeight:800,marginBottom:4,color:t.text}}>Visão Geral</div>
            <div style={{fontSize:11,color:t.sub,marginBottom:16}}>Resumo da plataforma</div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              {[
                {label:"Total Usuários",  val:users.length,      sub:"cadastrados",    color:"#7C6AF7"},
                {label:"Premium",         val:premium.length,    sub:"assinantes",     color:"#34D399"},
                {label:"Free",            val:freeUsers.length,  sub:"usuários",       color:"#FBBF24"},
                {label:"Receita Mensal",  val:`R$ ${totalRevenue}`,sub:"estimada",     color:"#F87171"},
                {label:"Total Publis",    val:allPublis.length,  sub:"registradas",    color:"#60A5FA"},
                {label:"Rede Total",      val:totalRefs,         sub:"indicações",     color:"#A78BFA"},
              ].map(s=>(
                <Card key={s.label} t={t} style={{padding:"14px 16px"}}>
                  <div style={{fontSize:10,color:t.sub,fontWeight:700,marginBottom:4}}>{s.label.toUpperCase()}</div>
                  <div style={{fontSize:22,fontWeight:800,color:s.color}}>{s.val}</div>
                  <div style={{fontSize:10,color:t.sub}}>{s.sub}</div>
                </Card>
              ))}
            </div>

            {/* Planos breakdown */}
            <Card t={t} style={{marginBottom:14}}>
              <SecTitle t={t}>DISTRIBUIÇÃO DE PLANOS</SecTitle>
              <div style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:12,color:t.text,fontWeight:600}}>Premium</span>
                  <span style={{fontSize:12,color:"#34D399",fontWeight:700}}>{premium.length} usuários</span>
                </div>
                <PBar value={premium.length} max={users.length} color="#34D399" t={t}/>
              </div>
              <div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:12,color:t.text,fontWeight:600}}>Free</span>
                  <span style={{fontSize:12,color:"#FBBF24",fontWeight:700}}>{freeUsers.length} usuários</span>
                </div>
                <PBar value={freeUsers.length} max={users.length} color="#FBBF24" t={t}/>
              </div>
            </Card>

            {/* Saques pendentes */}
            <Card t={t} style={{marginBottom:14}}>
              <SecTitle t={t}>SAQUES PENDENTES</SecTitle>
              {withdrawals.filter(w=>w.status==="aguardando").length===0
                ?<div style={{fontSize:12,color:t.sub,textAlign:"center",padding:12}}>Nenhum saque pendente ✓</div>
                :withdrawals.filter(w=>w.status==="aguardando").map(w=>{
                  const u=INIT_USERS.find(x=>x.id===w.userId);
                  return (
                    <div key={w.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${t.border}`}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:t.text}}>{u?.name}</div>
                        <div style={{fontSize:11,color:t.sub}}>PIX: {w.pixKey||"—"}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:15,fontWeight:800,color:"#34D399"}}>R$ {w.amount.toFixed(2)}</div>
                        <Pill label="⏳ Aguardando" color="#FBBF24"/>
                      </div>
                    </div>
                  );
                })
              }
            </Card>

            {/* Últimas atividades */}
            <SecTitle t={t}>ÚLTIMOS CADASTROS</SecTitle>
            {[...users].reverse().slice(0,4).map(u=>(
              <div key={u.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${t.border}`}}>
                <Av initials={u.avatar} size={34} t={t}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:t.text}}>{u.name}</div>
                  <div style={{fontSize:10,color:t.sub}}>{u.joinDate}</div>
                </div>
                <Pill label={u.plan==="premium"?"✦ Premium":"Free"} color={u.plan==="premium"?t.accent:"#6B7280"}/>
              </div>
            ))}
          </div>
        )}

        {/* ADMIN USERS */}
        {tab==="users"&&(
          <div className="fi">
            <div style={{fontSize:20,fontWeight:800,marginBottom:4,color:t.text}}>Cadastros</div>
            <div style={{fontSize:11,color:t.sub,marginBottom:16}}>{users.length} usuários registrados</div>
            <div style={{marginBottom:16}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nome ou usuário..."
                style={{width:"100%",background:t.inputBg,border:`1px solid ${t.inputBorder}`,borderRadius:10,padding:"12px 14px",fontSize:14,color:t.text}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
              {[{label:"Total",val:users.length,color:t.accent},{label:"Premium",val:premium.length,color:"#34D399"},{label:"Free",val:freeUsers.length,color:"#FBBF24"}].map(s=>(
                <div key={s.label} style={{background:`${s.color}0C`,border:`1px solid ${s.color}28`,borderRadius:12,padding:12,textAlign:"center"}}>
                  <div style={{fontSize:24,fontWeight:800,color:s.color}}>{s.val}</div>
                  <div style={{fontSize:10,color:t.sub}}>{s.label}</div>
                </div>
              ))}
            </div>
            {filtUsers.map(u=>(
              <Card key={u.id} t={t} style={{marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                  <Av initials={u.avatar} size={42} t={t}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:700,color:t.text}}>{u.name}</div>
                    <div style={{fontSize:11,color:t.sub}}>@{u.username} · {u.id}</div>
                    <div style={{fontSize:11,color:t.sub}}>Desde: {u.joinDate}</div>
                  </div>
                  <Pill label={u.plan==="premium"?"✦ Premium":"Free"} color={u.plan==="premium"?t.accent:"#6B7280"}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
                  {[
                    {label:"Seguidores",    val:(u.followers/1000).toFixed(1)+"k"},
                    {label:"Indicações",    val:u.referrals?.length||0},
                    {label:"Ref. ID",       val:u.referralId},
                    {label:"Referido por",  val:u.referredBy||"—"},
                  ].map(s=>(
                    <div key={s.label} style={{background:t.inputBg,borderRadius:8,padding:"8px 10px"}}>
                      <div style={{fontSize:9,color:t.sub,marginBottom:2}}>{s.label.toUpperCase()}</div>
                      <div style={{fontSize:12,fontWeight:700,color:t.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.val}</div>
                    </div>
                  ))}
                </div>
                {/* Edit followers inline */}
                {editUser===u.id?(
                  <div style={{borderTop:`1px solid ${t.border}`,paddingTop:10}}>
                    <div style={{fontSize:10,fontWeight:800,color:t.sub,marginBottom:6}}>EDITAR SEGUIDORES</div>
                    <div style={{display:"flex",gap:8}}>
                      <input
                        defaultValue={u.followers}
                        id={`fol-${u.id}`}
                        type="number"
                        style={{flex:1,background:t.inputBg,border:`1px solid ${t.inputBorder}`,borderRadius:8,padding:"8px 12px",fontSize:14,color:t.text}}
                      />
                      <button onClick={()=>{
                        const val=parseInt(document.getElementById(`fol-${u.id}`).value)||0;
                        setUsers(prev=>prev.map(x=>x.id!==u.id?x:{...x,followers:val}));
                        setEditUser(null);
                      }} style={{background:`linear-gradient(135deg,${t.accent},#6366F1)`,border:"none",borderRadius:8,padding:"8px 14px",color:"#FFF",fontWeight:700,fontSize:12,cursor:"pointer"}}>Salvar</button>
                      <button onClick={()=>setEditUser(null)} style={{background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:8,padding:"8px 10px",color:t.sub,cursor:"pointer",fontSize:12}}>✕</button>
                    </div>
                  </div>
                ):(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <button onClick={()=>setEditUser(u.id)} className="s"
                      style={{background:t.accentSoft,border:`1px solid ${t.accent}30`,color:t.accent,borderRadius:8,padding:"6px 0",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                      ✏️ Editar Perfil
                    </button>
                    <button onClick={()=>setUsers(prev=>prev.map(x=>x.id!==u.id?x:{...x,plan:x.plan==="premium"?"free":"premium"}))} className="s"
                      style={{background:u.plan==="premium"?"#F8717114":"#34D39914",border:`1px solid ${u.plan==="premium"?"#F8717130":"#34D39930"}`,color:u.plan==="premium"?"#F87171":"#34D399",borderRadius:8,padding:"6px 0",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                      {u.plan==="premium"?"⬇ Free":"⬆ Premium"}
                    </button>
                  </div>
                )}
              </Card>
            ))}
          </div>
        )}

        {/* ADMIN REDE */}
        {tab==="divulgar"&&(
          <div className="fi">
            <AdminDivulgarTab allDivulg={allDivulg} mktProposals={mktProposals} mktCandidats={mktCandidats} users={users} t={t} fsUpdate={fsUpdate} fsAdd={fsAdd}/>
          </div>
        )}

        {tab==="rede"&&(
          <div className="fi">
            <div style={{fontSize:20,fontWeight:800,marginBottom:4,color:t.text}}>Rede de Indicações</div>
            <div style={{fontSize:11,color:t.sub,marginBottom:16}}>Estrutura completa de indicados</div>

            {/* Summary */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
              {[
                {label:"Nível 1",val:users.filter(u=>u.referredBy&&INIT_USERS.find(x=>x.referralId===u.referredBy&&!x.referredBy)).length,color:t.accent},
                {label:"Nível 2",val:users.filter(u=>{if(!u.referredBy)return false;const p=INIT_USERS.find(x=>x.referralId===u.referredBy);return p&&p.referredBy;}).length,color:"#6366F1"},
                {label:"Nível 3",val:users.filter(u=>{if(!u.referredBy)return false;const p=INIT_USERS.find(x=>x.referralId===u.referredBy);if(!p?.referredBy)return false;const g=INIT_USERS.find(x=>x.referralId===p.referredBy);return g&&g.referredBy;}).length,color:"#60A5FA"},
              ].map(s=>(
                <div key={s.label} style={{background:`${s.color}0C`,border:`1px solid ${s.color}28`,borderRadius:12,padding:12,textAlign:"center"}}>
                  <div style={{fontSize:22,fontWeight:800,color:s.color}}>{s.val}</div>
                  <div style={{fontSize:10,color:t.sub}}>{s.label}</div>
                </div>
              ))}
            </div>

            {/* Árvore */}
            <Card t={t} style={{marginBottom:14}}>
              <SecTitle t={t}>ÁRVORE COMPLETA DE INDICAÇÕES</SecTitle>
              {buildNetworkTree().map(node=>renderNode(node))}
            </Card>

            {/* Per-user commissions */}
            <SecTitle t={t}>COMISSÕES POR USUÁRIO</SecTitle>
            {users.filter(u=>(u.referrals?.length||0)>0).map(u=>{
              const total=u.referrals.reduce((a,r)=>a+r.commission,0);
              return (
                <Card key={u.id} t={t} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <Av initials={u.avatar} size={34} t={t}/>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:t.text}}>{u.name}</div>
                        <div style={{fontSize:10,color:t.sub}}>{u.referrals.length} indicados na rede</div>
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:16,fontWeight:800,color:"#34D399"}}>R$ {total.toFixed(2)}</div>
                      <div style={{fontSize:9,color:t.sub}}>/mês</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    {[{l:"L1",c:t.accent,v:u.referrals.filter(r=>r.level===1).length},{l:"L2",c:"#6366F1",v:u.referrals.filter(r=>r.level===2).length},{l:"L3",c:"#60A5FA",v:u.referrals.filter(r=>r.level===3).length}].map(lv=>(
                      <div key={lv.l} style={{flex:1,background:`${lv.c}10`,border:`1px solid ${lv.c}28`,borderRadius:8,padding:"6px",textAlign:"center"}}>
                        <div style={{fontSize:16,fontWeight:800,color:lv.c}}>{lv.v}</div>
                        <div style={{fontSize:9,color:t.sub}}>{lv.l}</div>
                      </div>
                    ))}
                  </div>
                </Card>
              );
            })}
          </div>
        )}

        {/* PAGAMENTOS */}
        {tab==="pagamentos"&&(
          <div className="fi">
            <div style={{fontSize:20,fontWeight:800,marginBottom:4,color:t.text}}>Solicitações de Saque</div>
            <div style={{fontSize:11,color:t.sub,marginBottom:16}}>{withdrawals.length} solicitações</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
              {[{label:"Aguardando",val:withdrawals.filter(w=>w.status==="aguardando").length,color:"#FBBF24"},{label:"Pagos",val:withdrawals.filter(w=>w.status==="pago").length,color:"#34D399"}].map(s=>(
                <div key={s.label} style={{background:`${s.color}0C`,border:`1px solid ${s.color}28`,borderRadius:12,padding:12,textAlign:"center"}}>
                  <div style={{fontSize:28,fontWeight:800,color:s.color}}>{s.val}</div>
                  <div style={{fontSize:11,color:t.sub}}>{s.label}</div>
                </div>
              ))}
            </div>
            {withdrawals.length===0&&<div style={{textAlign:"center",padding:32,color:t.sub,fontSize:13}}>Nenhuma solicitação ainda.</div>}
            {withdrawals.map(w=>{
              const u=INIT_USERS.find(x=>x.id===w.userId);
              return (
                <Card key={w.id} t={t} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:700,color:t.text}}>{u?.name||"Usuário"}</div>
                      <div style={{fontSize:11,color:t.sub}}>@{u?.username} · {w.date}</div>
                      <div style={{fontSize:11,color:t.sub,marginTop:2}}>PIX: <span style={{color:t.text,fontWeight:600}}>{w.pixKey||"—"}</span></div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:22,fontWeight:800,color:"#34D399"}}>R$ {w.amount.toFixed(2)}</div>
                      <Pill label={w.status==="pago"?"✅ Pago":"⏳ Aguardando"} color={w.status==="pago"?"#34D399":"#FBBF24"}/>
                    </div>
                  </div>
                  <div style={{background:"#FBBF2410",border:"1px solid #FBBF2430",borderRadius:8,padding:"8px 12px",marginBottom:10}}>
                    <div style={{fontSize:11,color:"#FBBF24",fontWeight:600}}>⏰ Pagamentos realizados até às 18h do dia do saque.</div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {["aguardando","pago"].map(s=>(
                      <button key={s} onClick={()=>setWithdrawals(prev=>prev.map(x=>x.id===w.id?{...x,status:s}:x))}
                        style={{padding:"9px 0",borderRadius:10,border:`2px solid ${w.status===s?(s==="pago"?"#34D399":"#FBBF24"):t.border}`,background:w.status===s?(s==="pago"?"#34D39914":"#FBBF2414"):t.inputBg,color:w.status===s?(s==="pago"?"#34D399":"#FBBF24"):t.sub,fontWeight:800,fontSize:12,cursor:"pointer"}}>
                        {s==="pago"?"✅ Marcar Pago":"⏳ Aguardando"}
                      </button>
                    ))}
                  </div>
                </Card>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── ROOT ─── */
function InfluencePRO() {
  const [screen,setScreen] = useState("login");
  const [user,setUser]     = useState(null);
  const [theme,setTheme]   = useState("dark");
  const t = THEMES[theme];
  const toggle = () => setTheme(th=>{ const nv=th==="dark"?"light":"dark"; try{localStorage.setItem("ip_theme",nv);}catch(e){} return nv; });

  return (
    <div style={{background:t.bg,minHeight:"100vh"}}>
      {screen==="login"    && <LoginScreen    onLogin={u=>{setUser(u);setScreen(u.isAdmin?"admin":"app");}} onGoRegister={()=>setScreen("register")} t={t} themeToggle={toggle} theme={theme}/>}
      {screen==="register" && <RegisterScreen onBack={()=>setScreen("login")} onRegister={u=>{setUser(u);setScreen("app");}} t={t}/>}
      {screen==="app"      && user && <MainApp user={user} t={t} themeToggle={toggle} theme={theme} onLogout={()=>{setUser(null);setScreen("login");}}/>}
      {screen==="admin"    && user && <AdminPanel t={t} themeToggle={toggle} theme={theme} onLogout={()=>{setUser(null);setScreen("login");}}/>}
    </div>
  );
}

    // Mount
    const rootEl = ReactDOM.createRoot(document.getElementById('root'));
    rootEl.render(React.createElement(InfluencePRO));
  </script>
</body>
</html>
